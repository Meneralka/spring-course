<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${pageTitle}">Заявки</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">Help Desk</a>
        <div class="navbar-nav">
            <a class="nav-link" th:href="@{/}">Главная</a>
            <a class="nav-link" th:href="@{/about}">О нас</a>
            <a class="nav-link" th:href="@{/contacts}">Контакты</a>
            <a class="nav-link active" th:href="@{/tickets}">Заявки</a>
        </div>
    </div>
</nav>

<main class="container py-5">
    <h1 class="fw-bold mb-4">Список заявок</h1>

    <div class="table-responsive">
        <table class="table table-striped table-hover align-middle shadow-sm">
            <thead class="table-primary">
            <tr>
                <th>#</th>
                <th>Тема</th>
                <th>Клиент</th>
                <th>Статус</th>
                <th>Дата создания</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="ticket : ${tickets}">
                <td th:text="${ticket.id}">1</td>
                <td th:text="${ticket.title}">Тема</td>
                <td th:text="${ticket.customerName}">Клиент</td>
                <td>
                    <span th:text="${ticket.status}"
                          th:classappend="${ticket.status.name() == 'NEW'} ? 'badge bg-secondary'
                                        : (${ticket.status.name() == 'IN_PROGRESS'} ? 'badge bg-warning text-dark'
                                        : 'badge bg-success')"
                          class="badge">
                        Статус
                    </span>
                </td>
                <td th:text="${#temporals.format(ticket.createdAt, 'dd.MM.yyyy HH:mm')}">01.01.2026</td>
            </tr>
            </tbody>
        </table>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
